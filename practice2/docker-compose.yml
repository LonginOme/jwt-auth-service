version: "3.9"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: jwtdb
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d jwtdb"]
      interval: 5s
      retries: 5

  auth_service:
    build: ./services/auth_service
    environment:
      DATABASE_URL: postgresql://user:password@postgres:5432/jwtdb
      SECRET_KEY: supersecretkey
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy

  api_gateway:
    build: ./services/api_gateway
    environment:
      AUTH_SERVICE_URL: http://auth_service:8001
    ports:
      - "8000:8000"
    depends_on:
      - auth_service