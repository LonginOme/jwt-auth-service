apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15
          env:
            - name: POSTGRES_USER
              value: user
            - name: POSTGRES_DB
              value: jwtdb
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: POSTGRES_PASSWORD
          ports:
            - containerPort: 5432